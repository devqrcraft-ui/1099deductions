<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page Not Found — 1099Deductions.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#07111F; --navy:#0B1E36; --gold:#B8924A; --gold2:#D4AA66;
  --text:#C8D8EC; --text2:#7A96B8; --border:rgba(184,146,74,0.18);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--ink);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:24px;
}
.wrap{max-width:480px;}
.code{
  font-family:'Playfair Display',serif;font-weight:700;
  font-size:88px;color:var(--gold2);line-height:1;margin-bottom:8px;
}
h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:12px;}
p{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:28px;}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
a.btn{
  display:inline-block;padding:10px 20px;border:1px solid var(--border);
  border-radius:6px;color:var(--gold2);text-decoration:none;font-size:13px;
  font-weight:500;transition:border-color .2s;
}
a.btn:hover{border-color:var(--gold);}
a.btn.primary{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>This page doesn't exist</h1>
  <p>The page you're looking for was moved or never existed. Try one of these instead:</p>
  <div class="links">
    <a class="btn primary" href="/">Home</a>
    <a class="btn" href="/deductions/">All Deduction Guides</a>
  </div>
</div>
</body>
</html>
